<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抢答系统 · 管理端</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0e1a; --surface:#111827; --surface2:#1a2236;
    --border:#1e3a5f; --accent:#00d4ff; --gold:#ffd700;
    --green:#00e676; --red:#ff4444; --text:#e8f4fd; --muted:#5a7a9a;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;min-height:100vh;
    background-image:radial-gradient(ellipse at 20% 10%,rgba(0,212,255,.06) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 80%,rgba(255,107,53,.05) 0%,transparent 50%);}

  /* ── 登录页 ── */
  .login-overlay{position:fixed;inset:0;background:var(--bg);z-index:999;
    display:flex;align-items:center;justify-content:center;
    background-image:radial-gradient(ellipse at 50% 30%,rgba(0,212,255,.1) 0%,transparent 60%);}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;
    padding:44px 40px;width:440px;max-width:94vw;text-align:center;
    box-shadow:0 30px 80px rgba(0,0,0,.6);}
  .login-logo{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;color:var(--accent);
    text-shadow:0 0 30px rgba(0,212,255,.6);letter-spacing:3px;margin-bottom:4px;}
  .login-sub{font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:28px;}
  .login-field{margin-bottom:12px;text-align:left;}
  .login-field label{display:block;font-size:11px;color:var(--muted);letter-spacing:1px;
    text-transform:uppercase;margin-bottom:5px;}
  .login-input{background:var(--bg);border:1px solid var(--border);color:var(--text);
    border-radius:10px;padding:12px 16px;font-family:inherit;font-size:14px;width:100%;
    transition:border-color .2s,box-shadow .2s;}
  .login-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 20px rgba(0,212,255,.15);}
  .login-btn{width:100%;margin-top:10px;padding:14px;background:linear-gradient(135deg,var(--accent),#0088bb);
    color:#000;border:none;border-radius:10px;font-size:15px;font-weight:900;font-family:inherit;
    cursor:pointer;transition:all .2s;letter-spacing:2px;box-shadow:0 6px 25px rgba(0,212,255,.3);}
  .login-btn:hover{transform:translateY(-2px);}
  .login-err{margin-top:10px;font-size:13px;color:var(--red);min-height:18px;font-weight:600;}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}

  /* ── 顶栏 ── */
  .topbar{background:rgba(10,14,26,.95);border-bottom:1px solid var(--border);padding:12px 24px;
    display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
  .topbar-title{font-family:'Orbitron',sans-serif;font-size:18px;color:var(--accent);letter-spacing:2px;text-shadow:0 0 20px rgba(0,212,255,.5);}
  .badge{border-radius:20px;font-size:11px;font-weight:700;padding:3px 10px;letter-spacing:1px;}
  .badge-admin{background:linear-gradient(135deg,#ff6b35,#ff4444);color:white;}
  .badge-room{background:rgba(0,212,255,.15);border:1px solid var(--accent);color:var(--accent);}

  /* ── 布局 ── */
  .main-grid{display:grid;grid-template-columns:320px 1fr 280px;gap:16px;padding:16px;max-width:1600px;margin:0 auto;}
  @media(max-width:1200px){.main-grid{grid-template-columns:280px 1fr}.right-col{display:none}}
  @media(max-width:800px){.main-grid{grid-template-columns:1fr}}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .panel-header{background:var(--surface2);border-bottom:1px solid var(--border);padding:12px 16px;
    display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .panel-title{font-size:13px;font-weight:700;letter-spacing:1px;color:var(--accent);text-transform:uppercase;}
  .panel-body{padding:14px;}
  .status-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:14px 20px;display:flex;align-items:center;gap:20px;margin-bottom:16px;flex-wrap:wrap;}
  .status-item{display:flex;align-items:center;gap:8px;}
  .status-dot{width:10px;height:10px;border-radius:50%;background:var(--muted);transition:all .3s;}
  .status-dot.active{background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .status-label{font-size:13px;color:var(--muted);}
  .status-value{font-size:13px;font-weight:700;}

  /* ── 按钮 ── */
  .btn{border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:13px;border-radius:8px;
    padding:8px 16px;transition:all .2s;letter-spacing:.5px;display:inline-flex;align-items:center;gap:6px;}
  .btn:hover{transform:translateY(-1px)}.btn:active{transform:translateY(0)}
  .btn-primary{background:linear-gradient(135deg,var(--accent),#0099cc);color:#000;box-shadow:0 4px 15px rgba(0,212,255,.3);}
  .btn-danger{background:linear-gradient(135deg,var(--red),#cc0000);color:white;box-shadow:0 4px 15px rgba(255,68,68,.3);}
  .btn-success{background:linear-gradient(135deg,var(--green),#00aa55);color:#000;box-shadow:0 4px 15px rgba(0,230,118,.3);}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
  .btn-outline:hover{border-color:var(--accent);color:var(--accent);}
  .btn-sm{padding:5px 10px;font-size:12px;}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
  .ctrl-open{width:100%;padding:16px;font-size:16px;font-family:'Orbitron',sans-serif;border:none;cursor:pointer;
    border-radius:10px;background:linear-gradient(135deg,#00e676,#00aa55);color:#000;font-weight:900;
    letter-spacing:2px;box-shadow:0 6px 25px rgba(0,230,118,.4);transition:all .2s;}
  .ctrl-open:hover{transform:translateY(-2px)}.ctrl-open:disabled{opacity:.3;cursor:not-allowed;transform:none;}
  .ctrl-reset{width:100%;padding:12px;font-size:14px;border:none;cursor:pointer;border-radius:10px;
    background:linear-gradient(135deg,#555,#333);color:#aaa;font-weight:700;transition:all .2s;margin-top:8px;}
  .ctrl-reset:hover{background:linear-gradient(135deg,#666,#444);color:white;}

  /* ── 输入 ── */
  .input{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;
    padding:8px 12px;font-family:inherit;font-size:13px;width:100%;transition:border-color .2s;}
  .input:focus{outline:none;border-color:var(--accent);}
  .input-group{display:flex;gap:8px;margin-bottom:10px;}

  /* ── 队伍 ── */
  .team-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;transition:border-color .2s;}
  .team-item:hover{border-color:var(--accent);}
  .team-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .team-name{font-weight:700;font-size:14px;color:var(--accent);}
  .team-score{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;color:var(--gold);}
  .team-score.neg{color:var(--red);}
  .team-members{font-size:12px;color:var(--muted);}
  .team-actions{display:flex;gap:6px;margin-top:8px;}
  .member-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;}
  .member-chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:12px;display:flex;align-items:center;gap:6px;}
  .chip-del{cursor:pointer;color:var(--red);font-size:14px;line-height:1;}

  /* ── 抢答区 ── */
  .buzz-winner{background:linear-gradient(135deg,rgba(255,215,0,.18),rgba(255,107,53,.12));
    border:2px solid var(--gold);border-radius:14px;padding:24px 20px;text-align:center;
    margin-bottom:14px;position:relative;overflow:hidden;box-shadow:0 0 30px rgba(255,215,0,.15);}
  .buzz-winner::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,215,0,.12),transparent);animation:shine 2.5s infinite;}
  @keyframes shine{0%{left:-100%}100%{left:200%}}
  .winner-lbl{font-size:13px;color:rgba(255,215,0,.7);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;font-weight:600;}
  .winner-nm{font-size:48px;font-weight:900;color:var(--gold);margin:8px 0;line-height:1.1;
    text-shadow:0 0 30px rgba(255,215,0,.5);animation:wpop .4s cubic-bezier(.175,.885,.32,1.275);}
  @keyframes wpop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
  .winner-tm{font-size:22px;font-weight:700;color:rgba(255,215,0,.75);font-family:'Orbitron',sans-serif;letter-spacing:2px;margin-top:4px;}
  .winner-tm-lbl{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
  .buzz-result{background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:8px;}
  .buzz-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid rgba(30,58,95,.5);gap:12px;}
  .buzz-row:last-child{border-bottom:none;}
  .buzz-rank{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;width:28px;text-align:center;color:var(--muted);}
  .buzz-rank.r1{color:var(--gold)}.buzz-rank.r2{color:#c0c0c0}.buzz-rank.r3{color:#cd7f32}
  .buzz-team{flex:1;font-weight:700;font-size:14px;}
  .buzz-time{font-size:11px;color:var(--muted);font-family:'Orbitron',sans-serif;}
  .score-ctrl{background:linear-gradient(135deg,rgba(0,212,255,.05),rgba(255,107,53,.05));
    border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:12px;}
  .score-ctrl-title{font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
  .score-btns{display:flex;gap:8px;flex-wrap:wrap;}

  /* ── 排行 ── */
  .rank-row{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid rgba(30,58,95,.4);gap:10px;transition:background .2s;}
  .rank-row:hover{background:rgba(255,255,255,.02)}.rank-row:last-child{border-bottom:none;}
  .rank-num{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;width:24px;text-align:center;color:var(--muted);}
  .rank-num.r1{color:var(--gold)}.rank-num.r2{color:#c0c0c0}.rank-num.r3{color:#cd7f32}
  .rank-name{flex:1;font-size:13px;font-weight:600;}
  .rank-score{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;color:var(--accent);}
  .rank-score.neg{color:var(--red);}

  /* ── 历史 ── */
  .hist-item{padding:8px 12px;border-bottom:1px solid rgba(30,58,95,.3);font-size:12px;}
  .hist-item:last-child{border-bottom:none;}
  .hist-round{color:var(--accent);font-weight:700;}.hist-winner{color:var(--gold);}

  /* ── 轮次条 ── */
  .round-ind{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--border);}
  .round-num-big{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;color:var(--accent);}
  .round-badge{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:12px;color:var(--muted);font-family:'Orbitron',sans-serif;}
  .r-status-txt{font-size:12px;color:var(--muted);}
  .r-status-val{font-size:14px;font-weight:700;}

  /* ── 弹窗 ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:400px;max-width:90vw;}
  .modal-title{font-size:16px;font-weight:700;color:var(--accent);margin-bottom:16px;}
  .modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
  .form-label{font-size:12px;color:var(--muted);margin-bottom:5px;display:block;}
  .form-group{margin-bottom:12px;}

  /* ── Toast ── */
  .toast{position:fixed;top:20px;right:20px;background:var(--surface2);border:1px solid var(--border);
    border-radius:10px;padding:12px 18px;font-size:13px;z-index:300;transform:translateX(120%);
    transition:transform .3s;max-width:280px;border-left:3px solid var(--accent);}
  .toast.show{transform:translateX(0)}.toast.ok{border-left-color:var(--green)}.toast.err{border-left-color:var(--red);}

  /* ── 抢答成功强提示浮层 ── */
  .alert-overlay{position:fixed;inset:0;z-index:500;display:none;align-items:center;justify-content:center;
    background:rgba(0,0,0,.7);backdrop-filter:blur(8px);}
  .alert-overlay.show{display:flex;}
  .alert-card{background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,107,53,.1));
    border:2px solid var(--gold);border-radius:24px;padding:52px 64px;text-align:center;
    max-width:520px;width:92%;box-shadow:0 0 80px rgba(255,215,0,.3);
    animation:apop .35s cubic-bezier(.175,.885,.32,1.275);position:relative;overflow:hidden;}
  .alert-card::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,215,0,.1),transparent);animation:shine 2s infinite;}
  @keyframes apop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
  .alert-lbl{font-size:13px;color:rgba(255,215,0,.7);letter-spacing:4px;text-transform:uppercase;margin-bottom:12px;}
  .alert-name{font-size:56px;font-weight:900;color:var(--gold);text-shadow:0 0 50px rgba(255,215,0,.6);line-height:1.1;margin-bottom:10px;}
  .alert-time{font-family:'Orbitron',sans-serif;font-size:22px;color:rgba(255,215,0,.7);letter-spacing:3px;margin-bottom:6px;}
  .alert-hint{font-size:12px;color:var(--muted);margin-top:16px;}
</style>
</head>
<body>

<!-- 登录界面 -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-card" id="loginCard">
    <div style="font-size:44px;margin-bottom:14px;">🔐</div>
    <div class="login-logo">QUIZ MASTER</div>
    <div class="login-sub">管理员登录</div>
    <div class="login-field">
      <label>账号</label>
      <input class="login-input" id="adminUser" type="text" placeholder="管理员账号" autocomplete="username"
        onkeydown="if(event.key==='Enter')document.getElementById('adminPass').focus()">
    </div>
    <div class="login-field">
      <label>密码</label>
      <input class="login-input" id="adminPass" type="password" placeholder="管理员密码"
        onkeydown="if(event.key==='Enter')document.getElementById('adminRoom').focus()">
    </div>
    <!-- 多房间：房间号输入框 -->
    <div class="login-field">
      <label>房间号 <span style="color:var(--accent);font-weight:400;">(创建或接管)</span></label>
      <input class="login-input" id="adminRoom" type="text" placeholder="例如：A101、GAME1"
        onkeydown="if(event.key==='Enter')doAdminLogin()">
    </div>
    <button class="login-btn" onclick="doAdminLogin()">登 录 进 入 管 理</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- 顶栏 -->
<div class="topbar">
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="topbar-title">⚡ QUIZ MASTER</div>
    <span class="badge badge-admin">ADMIN</span>
    <span class="badge badge-room" id="roomBadge" style="display:none;"></span>
  </div>
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="status-item">
      <div class="status-dot active" id="syncDot"></div>
      <span class="status-label">实时同步</span>
    </div>
    <div class="round-badge" id="roundBadgeTop">第 1 轮</div>
    <div id="onlineCount" style="font-size:12px;color:var(--muted);">在线: 0 队</div>
  </div>
</div>

<div style="padding:0 16px;margin-top:12px;">
  <div class="status-bar">
    <div class="status-item">
      <div class="status-dot" id="buzzDot"></div>
      <span class="status-label">抢答状态：</span>
      <span class="status-value" id="buzzStatusText">未开放</span>
    </div>
    <div style="flex:1"></div>
    <button class="btn btn-outline btn-sm" onclick="openHelp()">📖 说明</button>
  </div>
</div>

<div class="main-grid">
  <!-- 左列：队伍管理 -->
  <div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">🏆 队伍管理</span>
        <button class="btn btn-primary btn-sm" onclick="openAddTeam()">+ 新增队伍</button>
      </div>
      <div class="panel-body" id="teamList"></div>
    </div>
  </div>

  <!-- 中列：控制+结果 -->
  <div>
    <div class="panel" style="margin-bottom:16px;">
      <div class="round-ind">
        <div>
          <div class="r-status-txt">当前轮次</div>
          <div class="round-num-big" id="roundNum">01</div>
        </div>
        <div style="flex:1;"></div>
        <div style="text-align:right;">
          <div class="r-status-txt">抢答状态</div>
          <div class="r-status-val" id="buzzState" style="color:var(--muted)">等待开放</div>
        </div>
      </div>
      <div class="panel-body">
        <button class="ctrl-open" id="openBuzzBtn" onclick="emitOpenBuzz()">▶ 开 启 抢 答</button>
        <button class="ctrl-reset" onclick="emitResetBuzz()">↺ 重置本轮抢答状态</button>
      </div>
    </div>

    <div class="panel" style="margin-bottom:16px;">
      <div class="panel-header">
        <span class="panel-title">🎯 本轮抢答结果</span>
        <div id="buzzCount" style="font-size:12px;color:var(--muted);">等待抢答…</div>
      </div>
      <div class="panel-body">
        <div class="buzz-winner" id="winnerDisplay" style="display:none;">
          <div class="winner-lbl">🏆 抢答成功</div>
          <div class="winner-nm" id="winnerName">—</div>
          <div class="winner-tm" id="winnerTime">—</div>
          <div class="winner-tm-lbl">反应时长</div>
        </div>
        <div class="score-ctrl" id="scoreControl" style="display:none;">
          <div class="score-ctrl-title">📊 裁判判分 — <span id="scoreTeamName" style="color:var(--gold)">—</span></div>
          <div class="score-btns">
            <button class="btn btn-success" onclick="emitScore(10)">+10分</button>
            <button class="btn btn-success" onclick="emitScore(5)">+5分</button>
            <button class="btn btn-success" onclick="emitScore(1)">+1分</button>
            <button class="btn btn-danger"  onclick="emitScore(-5)">-5分</button>
            <button class="btn btn-danger"  onclick="emitScore(-1)">-1分</button>
            <button class="btn btn-outline" onclick="emitScore(0)">跳过</button>
          </div>
          <div style="margin-top:10px;display:flex;gap:8px;align-items:center;">
            <input class="input" id="customScore" type="number" placeholder="自定义分数（可负）" style="width:160px;">
            <button class="btn btn-primary btn-sm" onclick="emitCustomScore()">确认</button>
          </div>
          <div style="margin-top:10px;font-size:12px;color:var(--muted);">💡 判分后自动进入下一轮 · 支持负分</div>
        </div>
        <div class="buzz-result">
          <div id="buzzList">
            <div style="padding:24px;text-align:center;color:var(--muted);font-size:13px;">开启抢答后，各队响应将实时显示于此</div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">📋 历史记录</span>
        <button class="btn btn-outline btn-sm" onclick="emitClearHistory()">清空</button>
      </div>
      <div id="historyList" style="max-height:200px;overflow-y:auto;">
        <div style="padding:16px;text-align:center;color:var(--muted);font-size:13px;">暂无历史</div>
      </div>
    </div>
  </div>

  <!-- 右列：排行榜 -->
  <div class="right-col">
    <div class="panel">
      <div class="panel-header"><span class="panel-title">📈 实时排行榜</span></div>
      <div id="rankList">
        <div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">添加队伍后显示</div>
      </div>
    </div>
  </div>
</div>

<!-- 队伍弹窗 -->
<div class="modal-overlay" id="teamModal" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modalTitle">➕ 新增队伍</div>
    <div class="form-group">
      <label class="form-label">队伍名称</label>
      <input class="input" id="teamNameInput" placeholder="请输入队伍名称">
    </div>
    <div class="form-group">
      <label class="form-label">成员名单（按Enter添加）</label>
      <div class="input-group">
        <input class="input" id="memberInput" placeholder="成员真实姓名" onkeydown="if(event.key==='Enter')addMemberChip()">
        <button class="btn btn-primary btn-sm" onclick="addMemberChip()">添加</button>
      </div>
      <div class="member-chips" id="memberChips"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveTeam()">保存</button>
    </div>
  </div>
</div>

<!-- 抢答成功强提示浮层（全端通用） -->
<div class="alert-overlay" id="alertOverlay" onclick="hideAlert()">
  <div class="alert-card">
    <div class="alert-lbl">🏆 抢答成功</div>
    <div class="alert-name" id="alertName">—</div>
    <div class="alert-time" id="alertTime">—</div>
    <div class="alert-hint">点击任意位置关闭 · 5秒后自动消失</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ============================================================
//  常量 & 全局
// ============================================================
const ADMIN_USER = 'zgtxmsc';
const ADMIN_PASS = 'yyjhzzb';

const socket = io();
let appState = null;
let editingTeamId = null;
let modalMembers  = [];

// ============================================================
//  登录
// ============================================================
function doAdminLogin() {
  const u = document.getElementById('adminUser').value.trim();
  const p = document.getElementById('adminPass').value;
  const r = document.getElementById('adminRoom').value.trim().toUpperCase();
  const e = document.getElementById('loginErr');

  if (u !== ADMIN_USER || p !== ADMIN_PASS) {
    e.textContent = '❌ 账号或密码错误';
    const c = document.getElementById('loginCard');
    c.style.animation = 'none'; c.offsetHeight; c.style.animation = 'shake .4s ease';
    return;
  }
  if (!r) { e.textContent = '❌ 请填写房间号'; return; }
  e.textContent = '连接中…';
  socket.emit('join_room', { roomId: r, role: 'admin', createRoom: true });
}

window.addEventListener('load', () => document.getElementById('adminUser').focus());

// ============================================================
//  Socket 事件
// ============================================================
socket.on('join_room_ok', ({ roomId }) => {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('roomBadge').textContent = `房间 ${roomId}`;
  document.getElementById('roomBadge').style.display = 'inline-block';
  showToast(`✅ 已进入房间 ${roomId}`, 'ok');
});

// 服务端权威状态下发（只渲染，不修改）
socket.on('sync_state', (s) => { appState = s; render(s); });

// 抢答成功强提示（服务端广播）
socket.on('buzz_winner_alert', ({ teamName, reactionMs }) => showAlert(teamName, reactionMs));

socket.on('error_msg', ({ code, msg }) => {
  if (['ROOM_NOT_FOUND','INVALID_ROOM'].includes(code)) {
    document.getElementById('loginErr').textContent = `❌ ${msg}`;
  } else {
    showToast(`⚠️ ${msg}`, 'err');
  }
});

socket.on('disconnect', () => {
  document.getElementById('syncDot').className = 'status-dot';
  showToast('⚠️ 与服务器断开，重新连接中…', 'err');
});
socket.on('connect', () => {
  document.getElementById('syncDot').className = 'status-dot active';
});

// ============================================================
//  动作指令（客户端只发指令，不直接改状态）
// ============================================================
const emitOpenBuzz    = () => socket.emit('action_open_buzz');
const emitResetBuzz   = () => { socket.emit('action_reset_buzz'); showToast('↺ 重置指令已发送'); };
const emitScore       = (d) => socket.emit('action_score', { delta: d });
const emitClearHistory= () => socket.emit('action_clear_history');

function emitCustomScore() {
  const v = parseInt(document.getElementById('customScore').value);
  if (isNaN(v)) { showToast('请输入有效分数', 'err'); return; }
  document.getElementById('customScore').value = '';
  emitScore(v);
}

function adjustScore(teamId, delta) {
  socket.emit('action_adjust_score', { teamId, delta });
}

// ============================================================
//  队伍管理
// ============================================================
function openAddTeam() {
  editingTeamId = null; modalMembers = [];
  document.getElementById('modalTitle').textContent = '➕ 新增队伍';
  document.getElementById('teamNameInput').value = '';
  document.getElementById('memberChips').innerHTML = '';
  document.getElementById('teamModal').style.display = 'flex';
}
function openEditTeam(id) {
  if (!appState) return;
  const t = appState.teams.find(t => t.id === id); if (!t) return;
  editingTeamId = id; modalMembers = [...(t.members||[])];
  document.getElementById('modalTitle').textContent = '✏️ 编辑队伍';
  document.getElementById('teamNameInput').value = t.name;
  renderModalChips();
  document.getElementById('teamModal').style.display = 'flex';
}
function addMemberChip() {
  const i = document.getElementById('memberInput');
  const v = i.value.trim(); if (!v || modalMembers.includes(v)) { i.value=''; return; }
  modalMembers.push(v); i.value = ''; renderModalChips();
}
function removeMemberChip(n) { modalMembers = modalMembers.filter(m=>m!==n); renderModalChips(); }
function renderModalChips() {
  document.getElementById('memberChips').innerHTML = modalMembers.map(m =>
    `<div class="member-chip">${m}<span class="chip-del" onclick="removeMemberChip('${m.replace(/'/g,"\\'")}')">×</span></div>`
  ).join('');
}
function saveTeam() {
  const name = document.getElementById('teamNameInput').value.trim();
  if (!name) { showToast('请填写队伍名称','err'); return; }
  if (editingTeamId) {
    socket.emit('action_manage_team',{ type:'edit', team:{ id:editingTeamId, name, members:[...modalMembers] }});
  } else {
    socket.emit('action_manage_team',{ type:'add', team:{ name, members:[...modalMembers] }});
  }
  closeModal();
}
function deleteTeam(id) {
  if (!confirm('确认删除？')) return;
  socket.emit('action_manage_team',{ type:'delete', team:{ id }});
}
function closeModal() { document.getElementById('teamModal').style.display='none'; }

// ============================================================
//  抢答成功强提示
// ============================================================
function showAlert(name, ms) {
  document.getElementById('alertName').textContent = name;
  document.getElementById('alertTime').textContent = fmtMs(ms);
  const o = document.getElementById('alertOverlay');
  o.classList.add('show');
  clearTimeout(o._t); o._t = setTimeout(hideAlert, 5000);
}
function hideAlert() { document.getElementById('alertOverlay').classList.remove('show'); }

// ============================================================
//  渲染（纯展示，状态全来自服务端）
// ============================================================
function render(s) {
  renderTeamList(s); renderBuzzArea(s);
  renderRankList(s); renderHistory(s); renderTopBar(s);
}

function renderTopBar(s) {
  document.getElementById('roundNum').textContent = String(s.round).padStart(2,'0');
  document.getElementById('roundBadgeTop').textContent = `第 ${s.round} 轮`;
  const dot=document.getElementById('buzzDot'), txt=document.getElementById('buzzStatusText'),
        st=document.getElementById('buzzState'), btn=document.getElementById('openBuzzBtn');
  if (s.buzzOpen) {
    dot.className='status-dot active'; txt.textContent='已开放 · 等待抢答'; txt.style.color='var(--green)';
    st.textContent='🟢 抢答中'; st.style.color='var(--green)';
    btn.disabled=true; btn.textContent='▶ 抢答已开放';
  } else {
    dot.className='status-dot'; txt.textContent='未开放'; txt.style.color='var(--muted)';
    st.textContent='⚪ 等待开放'; st.style.color='var(--muted)';
    btn.disabled=false; btn.textContent='▶ 开 启 抢 答';
  }
  document.getElementById('onlineCount').textContent=`在线: ${(s.onlineTeams||[]).length} 队`;
}

function renderTeamList(s) {
  const el=document.getElementById('teamList');
  if (!s.teams.length) { el.innerHTML='<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px;">暂无队伍</div>'; return; }
  el.innerHTML=s.teams.map(t=>`
    <div class="team-item">
      <div class="team-item-header">
        <span class="team-name">${t.name}</span>
        <span class="team-score ${t.score<0?'neg':''}">${t.score}</span>
      </div>
      <div class="team-members">👥 ${t.members?.length?t.members.join('、'):'暂无成员'}</div>
      <div class="team-actions">
        <button class="btn btn-outline btn-sm" onclick="openEditTeam('${t.id}')">✏️ 编辑</button>
        <button class="btn btn-danger btn-sm" onclick="deleteTeam('${t.id}')">🗑 删除</button>
        <button class="btn btn-success btn-sm" onclick="adjustScore('${t.id}',10)">+10</button>
        <button class="btn btn-danger btn-sm" onclick="adjustScore('${t.id}',-5)">-5</button>
      </div>
    </div>`).join('');
}

function renderBuzzArea(s) {
  const bCnt=document.getElementById('buzzCount'), wDisp=document.getElementById('winnerDisplay'),
        sCtrl=document.getElementById('scoreControl'), bList=document.getElementById('buzzList');
  if (!s.buzzList.length) {
    bCnt.textContent='等待抢答…'; wDisp.style.display='none'; sCtrl.style.display='none';
    bList.innerHTML='<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px;">开启抢答后，各队响应将实时显示于此</div>';
    return;
  }
  bCnt.textContent=`共 ${s.buzzList.length} 队抢答`;
  const w=s.buzzList[0], rMs=s.buzzOpenTs>0?w.serverTs-s.buzzOpenTs:0;
  wDisp.style.display='block';
  document.getElementById('winnerName').textContent=w.teamName;
  document.getElementById('winnerTime').textContent=fmtMs(rMs);
  if (s.buzzOpen||!s.scoredRound) {
    sCtrl.style.display='block';
    document.getElementById('scoreTeamName').textContent=w.teamName;
  } else { sCtrl.style.display='none'; }
  bList.innerHTML=s.buzzList.map((b,i)=>{
    const ms=s.buzzOpenTs>0?b.serverTs-s.buzzOpenTs:0;
    return `<div class="buzz-row">
      <div class="buzz-rank ${['r1','r2','r3'][i]||''}">${i+1}</div>
      <div class="buzz-team">${b.teamName}${b.playerName?` · <span style="font-size:12px;color:var(--muted)">${b.playerName}</span>`:''}</div>
      <div class="buzz-time">${fmtMs(ms)}</div>
    </div>`;
  }).join('');
}

function renderRankList(s) {
  const el=document.getElementById('rankList');
  if (!s.teams.length) { el.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">添加队伍后显示</div>'; return; }
  const sorted=[...s.teams].sort((a,b)=>b.score-a.score);
  el.innerHTML=sorted.map((t,i)=>`
    <div class="rank-row">
      <div class="rank-num ${['r1','r2','r3'][i]||''}">${i+1}</div>
      <div class="rank-name">${t.name}</div>
      <div class="rank-score ${t.score<0?'neg':''}">${t.score}</div>
    </div>`).join('');
}

function renderHistory(s) {
  const el=document.getElementById('historyList');
  if (!s.history?.length) { el.innerHTML='<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px;">暂无历史</div>'; return; }
  el.innerHTML=s.history.slice(0,30).map(h=>`
    <div class="hist-item">
      <span class="hist-round">第${h.round}轮</span>
      <span style="color:var(--muted);margin:0 6px;">•</span>
      <span class="hist-winner">${h.winner}</span>
      <span style="color:var(--muted);margin:0 6px;">•</span>
      <span style="color:${h.delta>0?'var(--green)':'var(--red)'};">${h.delta>0?'+':''}${h.delta}分</span>
      <span style="color:var(--muted);font-size:11px;margin-left:8px;">${h.time||''}</span>
    </div>`).join('');
}

function fmtMs(ms) {
  if (!ms||ms<=0) return '—';
  return ms<1000?`${ms} ms`:`${(ms/1000).toFixed(3)} s`;
}

function showToast(msg, type='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2800);
}

function openHelp() {
  alert('📖 使用说明\n\n1. 账号/密码/房间号登录\n2. 在「队伍管理」新增队伍和成员\n3. 点击「开启抢答」\n4. 队员端输入相同房间号加入\n5. 判分后自动进入下一轮\n\n账号: zgtxmsc  密码: yyjhzzb');
}
</script>
</body>
</html>
