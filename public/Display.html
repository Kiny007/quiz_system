<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抢答系统 · 大屏展示</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#050912;--surface:#0b1422;--surface2:#10192e;--border:#162a4a;
    --accent:#00d4ff;--accent2:#0066ff;--gold:#ffd700;--gold2:#ffaa00;
    --green:#00ff88;--red:#ff4455;--text:#e0f0ff;--muted:#3a5a7a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;overflow:hidden;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;
    background-image:radial-gradient(ellipse at 50% -10%,rgba(0,102,255,.15) 0%,transparent 60%),
    radial-gradient(ellipse at 10% 90%,rgba(0,212,255,.06) 0%,transparent 40%),
    radial-gradient(ellipse at 90% 90%,rgba(255,215,0,.04) 0%,transparent 40%);}
  body::before{content:'';position:fixed;inset:0;
    background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);
    background-size:60px 60px;pointer-events:none;}

  /* ── 房间号选择页 ── */
  .room-entry{position:fixed;inset:0;background:var(--bg);z-index:999;
    display:flex;align-items:center;justify-content:center;
    background-image:radial-gradient(ellipse at 50% 40%,rgba(0,212,255,.1) 0%,transparent 60%);}
  .room-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;
    padding:48px 44px;width:400px;max-width:94vw;text-align:center;
    box-shadow:0 30px 80px rgba(0,0,0,.6);}
  .room-logo{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;color:var(--accent);
    letter-spacing:4px;text-shadow:0 0 30px rgba(0,212,255,.6);margin-bottom:6px;}
  .room-sub{font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:28px;}
  .room-input{background:rgba(0,0,0,.4);border:1px solid var(--border);color:var(--text);
    border-radius:10px;padding:14px 18px;font-family:'Orbitron',sans-serif;font-size:18px;
    width:100%;text-align:center;letter-spacing:3px;transition:border-color .2s,box-shadow .2s;}
  .room-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 20px rgba(0,212,255,.15);}
  .room-btn{width:100%;margin-top:14px;padding:14px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;
    border:none;border-radius:10px;font-size:15px;font-weight:900;font-family:inherit;
    cursor:pointer;transition:all .2s;letter-spacing:2px;box-shadow:0 6px 25px rgba(0,212,255,.3);}
  .room-btn:hover{transform:translateY(-2px);}
  .room-err{margin-top:10px;font-size:13px;color:var(--red);min-height:18px;font-weight:600;}

  /* ── 主体页 ── */
  .display-page{display:none;width:100%;height:100%;flex-direction:column;}
  .display-page.show{display:flex;}

  /* ── 顶栏 ── */
  .header{position:relative;padding:14px 36px;display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid rgba(0,212,255,.15);background:rgba(5,9,18,.85);backdrop-filter:blur(20px);z-index:10;}
  .header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),var(--accent),transparent);opacity:.6;}
  .header-logo{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;color:var(--accent);
    text-shadow:0 0 40px rgba(0,212,255,.7);letter-spacing:4px;}
  .header-center{text-align:center;}
  .header-title{font-size:20px;font-weight:900;letter-spacing:4px;
    background:linear-gradient(135deg,#fff,var(--accent));-webkit-background-clip:text;
    -webkit-text-fill-color:transparent;background-clip:text;}
  .header-sub{font-size:11px;color:var(--muted);letter-spacing:3px;margin-top:2px;}
  .header-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
  .live-badge{display:flex;align-items:center;gap:6px;background:rgba(0,230,118,.1);
    border:1px solid rgba(0,230,118,.3);border-radius:20px;padding:4px 12px;
    font-size:12px;color:var(--green);font-weight:700;letter-spacing:1px;}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);
    box-shadow:0 0 8px var(--green);animation:blink 1s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  .room-tag{font-family:'Orbitron',sans-serif;font-size:13px;color:var(--accent);
    letter-spacing:2px;padding:2px 10px;background:rgba(0,212,255,.08);
    border:1px solid rgba(0,212,255,.2);border-radius:6px;}

  /* ── 主布局 ── */
  .main-layout{display:grid;grid-template-columns:1fr 380px;flex:1;overflow:hidden;}

  /* ── 左区 ── */
  .left-zone{padding:28px 36px;display:flex;flex-direction:column;gap:20px;overflow:hidden;}
  .round-display{display:flex;align-items:center;gap:20px;}
  .round-block{background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:10px 20px;display:flex;flex-direction:column;align-items:center;}
  .round-lbl{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
  .round-num{font-family:'Orbitron',sans-serif;font-size:40px;font-weight:900;color:var(--accent);
    text-shadow:0 0 30px rgba(0,212,255,.5);line-height:1;}
  .status-block{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:14px 24px;display:flex;align-items:center;gap:14px;}
  .status-icon{font-size:28px;}
  .status-main{font-size:18px;font-weight:700;}
  .status-sub{font-size:12px;color:var(--muted);margin-top:2px;}

  /* ── 大屏优胜区（需求4: 放大） ── */
  .winner-zone{flex:1;display:flex;align-items:center;justify-content:center;position:relative;}
  .winner-card{position:relative;background:linear-gradient(135deg,rgba(255,215,0,.1),rgba(255,107,53,.06));
    border:2px solid rgba(255,215,0,.4);border-radius:28px;padding:44px 64px;
    text-align:center;width:100%;max-width:800px;overflow:hidden;
    box-shadow:0 0 60px rgba(255,215,0,.1),inset 0 0 80px rgba(255,215,0,.04);}
  .winner-card::before{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,215,0,.08),transparent);animation:shine 3.5s infinite;}
  @keyframes shine{0%{left:-100%}100%{left:200%}}
  .win-lbl{font-size:12px;letter-spacing:5px;text-transform:uppercase;color:rgba(255,215,0,.6);margin-bottom:12px;font-weight:600;}
  .win-badge{display:inline-block;background:linear-gradient(135deg,var(--gold),var(--gold2));
    color:#000;font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;
    padding:5px 20px;border-radius:20px;letter-spacing:2px;margin-bottom:18px;box-shadow:0 4px 25px rgba(255,215,0,.5);}
  /* 需求4: 放大队名 */
  .win-name{font-size:72px;font-weight:900;color:var(--gold);
    text-shadow:0 0 50px rgba(255,215,0,.7),0 0 100px rgba(255,215,0,.25);
    line-height:1.1;letter-spacing:3px;margin-bottom:14px;
    animation:wpop .5s cubic-bezier(.175,.885,.32,1.275);}
  @keyframes wpop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
  .win-react-time{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:700;
    color:rgba(255,215,0,.75);letter-spacing:3px;margin-bottom:4px;}
  .win-react-lbl{font-size:12px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;}
  .win-members{font-size:14px;color:rgba(255,215,0,.5);letter-spacing:1px;}

  /* 需求3: 其他队抢答时间排名（完整 buzzList 展示） */
  .buzz-others-list{margin-top:16px;display:flex;flex-direction:column;gap:6px;width:100%;max-width:500px;margin-left:auto;margin-right:auto;}
  .buzz-other-row{display:flex;align-items:center;gap:12px;padding:7px 16px;
    background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;}
  .bo-rank{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;width:28px;text-align:center;color:var(--muted);}
  .bo-rank.r2{color:#c0c0c0}.bo-rank.r3{color:#cd7f32}
  .bo-team{flex:1;font-size:14px;font-weight:600;color:var(--text);}
  .bo-time{font-family:'Orbitron',sans-serif;font-size:12px;color:var(--muted);}

  /* 空态 */
  .empty-state{text-align:center;color:var(--muted);}
  .empty-icon{font-size:64px;margin-bottom:16px;opacity:.3;}
  .empty-txt{font-size:18px;}.empty-sub{font-size:13px;color:var(--border);margin-top:6px;}
  .buzzing-anim{font-size:80px;animation:bshake .3s infinite;}
  @keyframes bshake{0%,100%{transform:rotate(-5deg) scale(1.1)}50%{transform:rotate(5deg) scale(.9)}}

  /* ── 右区：排行榜 ── */
  .right-zone{background:rgba(11,20,34,.8);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .rank-header{padding:18px 22px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .rank-header-title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--accent);letter-spacing:2px;}
  .total-teams{font-size:12px;color:var(--muted);}
  .rank-scroll-wrap{flex:1;overflow:hidden;position:relative;}
  .rank-scroll{position:absolute;width:100%;animation:scrollup linear infinite;}
  @keyframes scrollup{0%{transform:translateY(0)}100%{transform:translateY(-50%)}}
  .rank-row{display:flex;align-items:center;padding:15px 22px;border-bottom:1px solid rgba(22,42,74,.5);gap:14px;position:relative;}
  .rank-row::after{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:transparent;}
  .rank-row.r1::after{background:var(--gold);box-shadow:0 0 10px var(--gold);}
  .rank-row.r2::after{background:#c0c0c0;}.rank-row.r3::after{background:#cd7f32;}
  .rank-pos{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;width:32px;text-align:center;color:var(--muted);flex-shrink:0;}
  .rank-pos.r1{color:var(--gold);text-shadow:0 0 15px rgba(255,215,0,.5);}
  .rank-pos.r2{color:#c0c0c0;}.rank-pos.r3{color:#cd7f32;}
  .rank-info{flex:1;overflow:hidden;}
  .rank-name-txt{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rank-name-txt.r1{color:var(--gold);}
  .rank-mem-sm{font-size:11px;color:var(--muted);margin-top:2px;}
  .score-bar-w{margin-top:4px;height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;}
  .score-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .8s ease;}
  .score-bar.r1{background:linear-gradient(90deg,var(--gold),var(--gold2));}
  .rank-score{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:var(--accent);flex-shrink:0;}
  .rank-score.r1{color:var(--gold);font-size:26px;text-shadow:0 0 15px rgba(255,215,0,.4);}
  .rank-score.neg{color:var(--red);}

  /* ── 跑马灯 ── */
  .ticker{position:fixed;bottom:0;left:0;right:0;height:34px;background:rgba(5,9,18,.95);
    border-top:1px solid rgba(0,212,255,.15);overflow:hidden;display:flex;align-items:center;}
  .ticker-lbl{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;
    font-weight:900;font-size:12px;padding:0 14px;height:100%;display:flex;align-items:center;flex-shrink:0;}
  .ticker-wrap{display:flex;animation:ticker 20s linear infinite;white-space:nowrap;align-items:center;}
  @keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
  .ticker-item{padding:0 28px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px;}
  .ticker-item .tg{color:var(--gold);font-weight:700;}
  .ticker-sep{color:var(--border);margin:0 8px;}

  /* ── 抢答成功强提示浮层 ── */
  .alert-overlay{position:fixed;inset:0;z-index:600;display:none;align-items:center;justify-content:center;
    background:rgba(0,0,0,.72);backdrop-filter:blur(10px);}
  .alert-overlay.show{display:flex;}
  .alert-card{background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,107,53,.1));
    border:2px solid var(--gold);border-radius:28px;padding:60px 80px;text-align:center;
    max-width:640px;width:92%;box-shadow:0 0 100px rgba(255,215,0,.4);
    animation:apop .4s cubic-bezier(.175,.885,.32,1.275);position:relative;overflow:hidden;}
  .alert-card::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,215,0,.1),transparent);animation:shine 2s infinite;}
  @keyframes apop{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
  .alert-lbl{font-size:14px;color:rgba(255,215,0,.7);letter-spacing:5px;text-transform:uppercase;margin-bottom:16px;}
  .alert-name{font-size:80px;font-weight:900;color:var(--gold);text-shadow:0 0 60px rgba(255,215,0,.7);line-height:1.1;margin-bottom:14px;}
  .alert-time{font-family:'Orbitron',sans-serif;font-size:28px;color:rgba(255,215,0,.75);letter-spacing:3px;}
</style>
</head>
<body>

<!-- 房间号选择页（支持 URL 参数 ?room=XXX 自动跳过） -->
<div class="room-entry" id="roomEntry">
  <div class="room-card">
    <div style="font-size:48px;margin-bottom:12px;">📺</div>
    <div class="room-logo">DISPLAY</div>
    <div class="room-sub">大屏展示端</div>
    <input class="room-input" id="roomInput" type="text" placeholder="输入房间号"
      maxlength="20" autocomplete="off"
      onkeydown="if(event.key==='Enter')joinRoom()">
    <button class="room-btn" onclick="joinRoom()">进 入 大 屏</button>
    <div class="room-err" id="roomErr"></div>
  </div>
</div>

<!-- 主展示页 -->
<div class="display-page" id="displayPage">
  <!-- 顶栏 -->
  <div class="header">
    <div class="header-logo">⚡ QUIZ</div>
    <div class="header-center">
      <div class="header-title">知识竞答系统</div>
      <div class="header-sub">LIVE QUIZ MASTER · DISPLAY</div>
    </div>
    <div class="header-right">
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
      <div class="room-tag" id="roomTag">—</div>
    </div>
  </div>

  <!-- 主内容 -->
  <div class="main-layout">
    <!-- 左区 -->
    <div class="left-zone">
      <div class="round-display">
        <div class="round-block">
          <div class="round-lbl">ROUND</div>
          <div class="round-num" id="roundNum">01</div>
        </div>
        <div class="status-block">
          <div class="status-icon" id="statusIcon">⚪</div>
          <div>
            <div class="status-main" id="statusMain">等待开始</div>
            <div class="status-sub" id="statusSub">管理员开放抢答后将显示</div>
          </div>
        </div>
      </div>

      <div class="winner-zone">
        <!-- 空态 -->
        <div id="emptyState" class="empty-state">
          <div class="empty-icon">🎯</div>
          <div class="empty-txt">等待抢答</div>
          <div class="empty-sub">管理员开放后结果显示于此</div>
        </div>
        <!-- 抢答中 -->
        <div id="buzzingState" class="empty-state" style="display:none;">
          <div class="buzzing-anim">🔔</div>
          <div style="font-size:36px;font-weight:900;color:var(--green);text-shadow:0 0 30px rgba(0,255,136,.6);margin-top:14px;">抢答开放中！</div>
          <div style="font-size:16px;color:var(--muted);margin-top:8px;">等待选手响应…</div>
        </div>
        <!-- 已有结果 -->
        <div class="winner-card" id="winnerCard" style="display:none;">
          <div class="win-lbl">🏆 ROUND WINNER</div>
          <div class="win-badge">第一名抢答成功</div>
          <div class="win-name" id="winName">—</div>
          <div class="win-react-time" id="winReactTime">—</div>
          <div class="win-react-lbl">反 应 时 长</div>
          <div class="win-members" id="winMembers"></div>
          <!-- 需求3: 完整 buzzList 排名列表 -->
          <div class="buzz-others-list" id="buzzOthersList"></div>
        </div>
      </div>
    </div>

    <!-- 右区：排行榜 -->
    <div class="right-zone">
      <div class="rank-header">
        <div class="rank-header-title">📊 RANKING</div>
        <div class="total-teams" id="totalTeams">—</div>
      </div>
      <div class="rank-scroll-wrap">
        <div class="rank-scroll" id="rankScroll"></div>
      </div>
    </div>
  </div>
</div>

<!-- 跑马灯 -->
<div class="ticker">
  <div class="ticker-lbl">实时数据</div>
  <div class="ticker-wrap" id="tickerWrap"></div>
</div>

<!-- 抢答成功强提示浮层 -->
<div class="alert-overlay" id="alertOverlay">
  <div class="alert-card">
    <div class="alert-lbl">🏆 抢答成功</div>
    <div class="alert-name" id="alertName">—</div>
    <div class="alert-time" id="alertTime">—</div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ============================================================
//  全局
// ============================================================
const socket = io();
let appState = null;

// ============================================================
//  URL 参数 ?room=XXX 自动加入
// ============================================================
window.addEventListener('load', () => {
  const params = new URLSearchParams(location.search);
  const roomParam = params.get('room') || params.get('Room') || params.get('ROOM');
  if (roomParam) {
    document.getElementById('roomInput').value = roomParam;
    joinRoom();
  } else {
    document.getElementById('roomInput').focus();
  }
});

function joinRoom() {
  const val = document.getElementById('roomInput').value.trim().toUpperCase();
  if (!val) { document.getElementById('roomErr').textContent = '❌ 请输入房间号'; return; }
  document.getElementById('roomErr').textContent = '连接中…';
  socket.emit('join_room', { roomId: val, role: 'display', createRoom: false });
}

// ============================================================
//  Socket 事件
// ============================================================
socket.on('join_room_ok', ({ roomId }) => {
  document.getElementById('roomEntry').style.display = 'none';
  document.getElementById('displayPage').classList.add('show');
  document.getElementById('roomTag').textContent = `ROOM ${roomId}`;
});

socket.on('sync_state', (s) => { appState = s; render(s); });

// 抢答成功强提示
socket.on('buzz_winner_alert', ({ teamName, reactionMs }) => showAlert(teamName, reactionMs));

socket.on('error_msg', ({ code, msg }) => {
  document.getElementById('roomErr').textContent = `❌ ${msg}`;
});

// ============================================================
//  强提示浮层（5秒自动消失）
// ============================================================
function showAlert(name, ms) {
  document.getElementById('alertName').textContent = name;
  document.getElementById('alertTime').textContent = fmtMs(ms);
  const o = document.getElementById('alertOverlay');
  o.classList.add('show');
  clearTimeout(o._t); o._t = setTimeout(() => o.classList.remove('show'), 5000);
}

// ============================================================
//  渲染
// ============================================================
function render(s) {
  if (!s) return;
  renderHeader(s);
  renderWinnerZone(s);
  renderRankList(s);
  renderTicker(s);
}

function renderHeader(s) {
  document.getElementById('roundNum').textContent = String(s.round).padStart(2,'0');
  const icon=document.getElementById('statusIcon'),
        main=document.getElementById('statusMain'),
        sub =document.getElementById('statusSub');
  if (s.buzzOpen && !s.buzzList?.length) {
    icon.textContent='🟢'; main.textContent='抢答进行中'; main.style.color='var(--green)';
    sub.textContent='选手可点击抢答按钮';
  } else if (s.buzzList?.length) {
    icon.textContent='🏆'; main.textContent=`${s.buzzList[0].teamName} 抢答成功`; main.style.color='var(--gold)';
    sub.textContent='等待裁判判分…';
  } else {
    icon.textContent='⚪'; main.textContent='等待开始'; main.style.color='var(--text)';
    sub.textContent='管理员开放后显示';
  }
}

function renderWinnerZone(s) {
  const empty     = document.getElementById('emptyState');
  const buzzing   = document.getElementById('buzzingState');
  const winCard   = document.getElementById('winnerCard');

  if (!s.buzzList?.length) {
    empty.style.display   = s.buzzOpen ? 'none' : 'block';
    buzzing.style.display = s.buzzOpen ? 'block' : 'none';
    winCard.style.display = 'none';
    return;
  }

  empty.style.display   = 'none';
  buzzing.style.display = 'none';
  winCard.style.display = 'block';

  const w = s.buzzList[0];
  const openTs = s.buzzOpenTs || 0;
  const rMs = openTs > 0 ? w.serverTs - openTs : 0;

  // 重播入场动画
  const nameEl = document.getElementById('winName');
  if (nameEl.textContent !== w.teamName) {
    nameEl.style.animation = 'none'; nameEl.offsetHeight; nameEl.style.animation = '';
  }
  nameEl.textContent = w.teamName;
  document.getElementById('winReactTime').textContent = fmtMs(rMs);

  const wTeam = s.teams?.find(t => t.id === w.teamId);
  document.getElementById('winMembers').textContent =
    wTeam?.members?.length ? `👥 ${wTeam.members.join(' · ')}` : '';

  // 需求3: 完整 buzzList 排名（第2名起，含反应时长）
  const others = s.buzzList.slice(1);
  document.getElementById('buzzOthersList').innerHTML = others.map((b, i) => {
    const bMs = openTs > 0 ? b.serverTs - openTs : 0;
    return `<div class="buzz-other-row">
      <div class="bo-rank ${['','r2','r3'][i+1]||''}">${i+2}</div>
      <div class="bo-team">${b.teamName}${b.playerName?` <span style="font-size:12px;color:var(--muted)">· ${b.playerName}</span>`:''}</div>
      <div class="bo-time">${fmtMs(bMs)}</div>
    </div>`;
  }).join('');
}

function renderRankList(s) {
  const el      = document.getElementById('rankScroll');
  const totalEl = document.getElementById('totalTeams');
  if (!s.teams?.length) {
    el.innerHTML = '<div style="padding:30px;text-align:center;color:var(--muted);">等待数据…</div>';
    totalEl.textContent = '—'; return;
  }
  const sorted = [...s.teams].sort((a,b) => b.score - a.score);
  const maxScore = Math.max(...sorted.map(t=>Math.abs(t.score)), 1);
  totalEl.textContent = `共 ${sorted.length} 支队伍`;

  const makeRows = () => sorted.map((t, i) => {
    const cls = ['r1','r2','r3'][i]||'';
    const bar = t.score > 0 ? Math.round(t.score/maxScore*100) : 0;
    return `<div class="rank-row ${cls}">
      <div class="rank-pos ${cls}">${i+1}</div>
      <div class="rank-info">
        <div class="rank-name-txt ${cls}">${t.name}</div>
        <div class="rank-mem-sm">${t.members?.length?t.members.join('、'):''}</div>
        <div class="score-bar-w"><div class="score-bar ${cls}" style="width:${bar}%"></div></div>
      </div>
      <div class="rank-score ${cls} ${t.score<0?'neg':''}">${t.score}</div>
    </div>`;
  }).join('');

  el.innerHTML = makeRows() + makeRows();
  el.style.animationDuration = Math.max(15, sorted.length * 4) + 's';
}

function renderTicker(s) {
  const el = document.getElementById('tickerWrap');
  if (!s.teams?.length) { el.innerHTML='<div class="ticker-item">等待数据…</div>'; return; }
  const sorted = [...s.teams].sort((a,b)=>b.score-a.score);
  const items = sorted.map((t,i)=>
    `<div class="ticker-item"><span style="color:var(--muted)">#${i+1}</span>
    <span class="tg">${t.name}</span>
    <span style="font-family:'Orbitron',sans-serif;color:${t.score<0?'var(--red)':'var(--accent)'};">${t.score}分</span>
    </div><div class="ticker-sep">·</div>`).join('');
  const hist = (s.history||[]).slice(0,5).map(h=>
    `<div class="ticker-item"><span style="color:var(--muted)">第${h.round}轮</span>
    <span class="tg">${h.winner}</span>
    <span style="color:${h.delta>0?'var(--green)':'var(--red)'};">${h.delta>0?'+':''}${h.delta}分</span>
    </div><div class="ticker-sep">·</div>`).join('');
  const full = items + hist;
  el.innerHTML = full + full;
}

function fmtMs(ms) {
  if (!ms || ms<=0) return '—';
  return ms < 1000 ? `${ms} ms` : `${(ms/1000).toFixed(3)} s`;
}

// 保底轮询
setInterval(() => { if (appState) render(appState); }, 2000);
</script>
</body>
